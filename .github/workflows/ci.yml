name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint + typecheck
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend type check (mypy)
        working-directory: backend
        run: |
          pip install -q mypy
          mypy app/services/ --ignore-missing-imports --no-error-summary || true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Backend dependency check
        working-directory: backend
        run: |
          pip install -q -r requirements.txt
          python -c "from app.services import storage, thumbnail, normalized, content_dna, brand_channel, category; print('All services import OK')"

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest httpx

      - name: Run backend tests
        env:
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_SERVICE_KEY: "mock-key"
          R2_ACCESS_KEY_ID: "mock"
          R2_SECRET_ACCESS_KEY: "mock"
        run: |
          cd backend && python -m pytest ../tests/backend/ -v --tb=short

  browser-tests:
    name: Browser Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    needs: api-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install -q pytest playwright
          playwright install chromium --with-deps

      - name: Run Playwright tests
        run: |
          python -m pytest tests/frontend/ -v --tb=short || true
